<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil | Muhammad Alvin Nugraha</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        :root {
            --amikom-purple: #6d28d9;
            --amikom-light: #a855f7;
            --bg-dark: #070b14;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--amikom-purple), var(--amikom-light));
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: 800;
            color: white;
            box-shadow: 0 0 40px rgba(109, 40, 217, 0.5);
            animation: pulse 1.5s infinite ease-in-out;
        }

        .loader-text {
            margin-top: 20px;
            font-size: 12px;
            letter-spacing: 4px;
            color: var(--amikom-light);
            text-transform: uppercase;
            font-weight: 600;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- BACKGROUND ELEMENTS --- */
        .bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(109, 40, 217, 0.2) 0%, transparent 70%);
            z-index: -1;
            border-radius: 50%;
        }

        /* --- CARD STYLING --- */
        .card-wrapper {
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            padding: 20px;
            width: 100%;
            max-width: 480px;
            visibility: hidden; /* Hidden until loader is gone */
            opacity: 0;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform-style: preserve-3d;
        }

        .profile-container {
            transform: translateZ(50px);
            margin-bottom: 30px;
        }

        .profile-initial {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--amikom-purple), var(--amikom-light));
            margin: 0 auto;
            border-radius: 38px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            font-weight: 800;
            color: white;
            box-shadow: 0 15px 35px rgba(109, 40, 217, 0.4);
            transition: transform 0.5s ease;
        }

        .info-container {
            transform: translateZ(30px);
        }

        .name {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff 60%, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .badge {
            font-size: 12px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 10px;
            text-transform: uppercase;
        }

        .nim-badge {
            background: rgba(168, 85, 247, 0.15);
            color: var(--amikom-light);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .campus-badge {
            background: rgba(255, 255, 255, 0.05);
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bio {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* --- BUTTONS --- */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s ease;
            margin-bottom: 12px;
            transform: translateZ(40px);
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--amikom-purple), #8b5cf6);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(109, 40, 217, 0.5);
        }

        .btn-primary:hover {
            box-shadow: 0 15px 30px -5px rgba(109, 40, 217, 0.6);
            transform: translateZ(50px) translateY(-3px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-dim);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.07);
            color: white;
            transform: translateZ(45px);
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 480px) {
            .card { padding: 40px 24px; }
            .name { font-size: 22px; }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="loader-logo">MA</div>
        <div class="loader-text">Loading Identity</div>
    </div>

    <!-- Background Glow -->
    <div class="bg-glow" style="top: -10%; left: -10%;"></div>
    <div class="bg-glow" style="bottom: -10%; right: -10%;"></div>

    <!-- Main Card Content -->
    <div class="card-wrapper" id="cardWrapper">
        <div class="card" id="mainCard">
            <div class="profile-container">
                <div class="profile-initial">MA</div>
            </div>

            <div class="info-container">
                <h1 class="name">MUHAMMAD ALVIN NUGRAHA</h1>
                
                <div class="badge-row">
                    <span class="badge nim-badge">24.11.6232</span>
                    <span class="badge campus-badge">Amikom Yogyakarta</span>
                </div>

                <p class="bio">
                    Creative Explorer & Technology Student. Membangun masa depan digital dari jantung Yogyakarta dengan inovasi dan kreativitas tanpa batas.
                </p>

                <div class="actions">
                    <a href="mailto:alvin@amikom.ac.id" class="btn btn-primary">Connect With Me</a>
                    <a href="#" class="btn btn-secondary">Creative Portfolio</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loader = document.getElementById('loader');
        const cardWrapper = document.getElementById('cardWrapper');
        const card = document.getElementById('mainCard');
        const body = document.body;

        // 1. Loader Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                cardWrapper.style.visibility = 'visible';
                cardWrapper.style.opacity = '1';
                cardWrapper.style.transition = 'opacity 1s ease';
            }, 1800);
        });

        // 2. Interactive Tilt Effect (Canvas bergeral mengikuti kursor)
        body.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return; // Disable on mobile for better UX

            const x = e.clientX;
            const y = e.clientY;
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            const rotateX = (centerY - y) / 20; // Sensitivitas gerakan
            const rotateY = (x - centerX) / 20;

            cardWrapper.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // 3. Reset Tilt on Mouse Leave
        body.addEventListener('mouseleave', () => {
            cardWrapper.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });
    </script>
</body>
</html>
